<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Wuroud Mart">
  <title>Login / Sign Up - Wuroud Mart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      display: flex;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    }

    .auth-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .auth-left h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .auth-left p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.1rem;
      max-width: 400px;
      text-align: center;
    }

    .auth-right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      background: white;
    }

    .auth-form {
      width: 100%;
      max-width: 400px;
    }

    .auth-form h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: var(--text-primary);
    }

    .form-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border-color);
    }

    .form-tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      font-weight: 600;
    }

    .form-tab.active {
      color: var(--primary-blue);
      border-bottom-color: var(--primary-blue);
    }

    .form-content {
      display: none;
    }

    .form-content.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary-blue);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .error-message {
      color: var(--danger-red);
      font-size: 0.875rem;
      margin-top: 0.25rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .forgot-password {
      text-align: right;
      margin-top: 1rem;
    }

    .forgot-password a {
      color: var(--primary-blue);
      text-decoration: none;
      font-size: 0.875rem;
    }

    .divider {
      text-align: center;
      margin: 2rem 0;
      position: relative;
      color: var(--text-secondary);
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-color);
    }

    .divider span {
      position: relative;
      background: white;
      padding: 0 0.5rem;
    }

    @media (max-width: 768px) {
      .auth-container {
        flex-direction: column;
      }

      .auth-left {
        padding: 1rem;
      }

      .auth-left h1 {
        font-size: 1.5rem;
      }

      .auth-right {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- Left Section -->
    <div class="auth-left">
      <div>
        <h1><i class="fas fa-shopping-bag" style="color: white;"></i> Wuroud Mart</h1>
        <p>Welcome back! Login to your account or create a new one to start shopping with us.</p>
      </div>
    </div>

    <!-- Right Section -->
    <div class="auth-right">
      <div class="auth-form">
        <!-- Form Tabs -->
        <div class="form-tabs">
          <div class="form-tab active" onclick="switchTab('login')">
            <i class="fas fa-sign-in-alt"></i> Login
          </div>
          <div class="form-tab" onclick="switchTab('signup')">
            <i class="fas fa-user-plus"></i> Sign Up
          </div>
        </div>

        <!-- Login Form -->
        <div class="form-content active" id="loginForm">
          <h2>Welcome Back</h2>
          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input type="email" id="loginEmail" name="email" required placeholder="your@email.com">
              <div class="error-message" id="loginEmailError"></div>
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" name="password" required placeholder="Enter your password">
              <div class="error-message" id="loginPasswordError"></div>
            </div>

            <button type="submit" class="btn-submit">
              <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <div class="forgot-password">
              <a href="#" onclick="alert('Please contact support to reset your password'); return false;">
                Forgot password?
              </a>
            </div>
          </form>
        </div>

        <!-- Signup Form -->
        <div class="form-content" id="signupForm">
          <h2>Create Account</h2>
          <form onsubmit="handleSignup(event)">
            <div class="form-group">
              <label for="signupName">Full Name</label>
              <input type="text" id="signupName" name="name" placeholder="Your full name">
            </div>

            <div class="form-group">
              <label for="signupEmail">Email Address</label>
              <input type="email" id="signupEmail" name="email" required placeholder="your@email.com">
              <div class="error-message" id="signupEmailError"></div>
            </div>

            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input type="password" id="signupPassword" name="password" required placeholder="At least 6 characters">
              <div class="error-message" id="signupPasswordError"></div>
            </div>

            <div class="form-group">
              <label for="signupConfirmPassword">Confirm Password</label>
              <input type="password" id="signupConfirmPassword" name="confirmPassword" required placeholder="Confirm your password">
              <div class="error-message" id="signupConfirmPasswordError"></div>
            </div>

            <button type="submit" class="btn-submit">
              <i class="fas fa-user-plus"></i> Create Account
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>

  <script>
    /**
     * Switch between login and signup tabs
     */
    function switchTab(tab) {
      // Update tabs
      document.querySelectorAll('.form-tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));

      // Add active class
      if (tab === 'login') {
        document.querySelectorAll('.form-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.form-tab')[1].classList.add('active');
        document.getElementById('signupForm').classList.add('active');
      }

      // Clear errors
      document.querySelectorAll('.error-message').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    /**
     * Handle login form submission
     */
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      // Clear previous errors
      document.getElementById('loginEmailError').classList.remove('show');
      document.getElementById('loginPasswordError').classList.remove('show');

      try {
        await loginUser(email, password);
        // Redirect on success
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (error) {
        // Show error
        if (error.code === 'auth/user-not-found') {
          document.getElementById('loginEmailError').textContent = 'Email not found. Please sign up first.';
          document.getElementById('loginEmailError').classList.add('show');
        } else if (error.code === 'auth/wrong-password') {
          document.getElementById('loginPasswordError').textContent = 'Incorrect password';
          document.getElementById('loginPasswordError').classList.add('show');
        } else {
          document.getElementById('loginPasswordError').textContent = error.message;
          document.getElementById('loginPasswordError').classList.add('show');
        }
      }
    }

    /**
     * Handle signup form submission
     */
    async function handleSignup(event) {
      event.preventDefault();

      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;

      // Clear previous errors
      document.querySelector('#signupForm .error-message').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });

      // Validate passwords match
      if (password !== confirmPassword) {
        document.getElementById('signupConfirmPasswordError').textContent = 'Passwords do not match';
        document.getElementById('signupConfirmPasswordError').classList.add('show');
        return;
      }

      try {
        await signupUser(email, password, name);
        // Redirect on success
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (error) {
        // Show error
        if (error.code === 'auth/email-already-in-use') {
          document.getElementById('signupEmailError').textContent = 'Email already registered. Please login instead.';
          document.getElementById('signupEmailError').classList.add('show');
        } else {
          document.getElementById('signupEmailError').textContent = error.message;
          document.getElementById('signupEmailError').classList.add('show');
        }
      }
    }

    // Redirect if already logged in
    setTimeout(() => {
      if (auth && auth.currentUser) {
        window.location.href = 'index.html';
      }
    }, 500);
  </script>
</body>
</html>
