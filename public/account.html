<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Account - Wuroud Mart">
  <title>My Account - Wuroud Mart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .account-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 2rem;
      padding: 2rem;
    }

    .account-sidebar {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      height: fit-content;
      box-shadow: var(--shadow-sm);
    }

    .account-sidebar .menu-item {
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.3s;
    }

    .account-sidebar .menu-item:hover {
      background: var(--bg-light);
    }

    .account-sidebar .menu-item.active {
      background: var(--primary-blue);
      color: white;
    }

    .account-content {
      background: white;
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
    }

    .profile-info h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .profile-info p {
      margin: 0.25rem 0;
      color: var(--text-secondary);
    }

    .order-card {
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }

    .order-card:hover {
      box-shadow: var(--shadow-md);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .order-id {
      font-weight: 600;
      color: var(--primary-blue);
    }

    .order-status {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .order-status.pending {
      background: #fff3cd;
      color: #856404;
    }

    .order-status.confirmed {
      background: #d4edda;
      color: #155724;
    }

    .order-status.shipped {
      background: #d1ecf1;
      color: #0c5460;
    }

    .order-items {
      background: var(--bg-light);
      padding: 1rem;
      border-radius: var(--radius);
      margin: 1rem 0;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
    }

    .order-total {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-top: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 1.1rem;
    }

    .edit-form {
      max-width: 500px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: var(--primary-blue);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-danger {
      background: var(--danger-red);
      color: white;
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: var(--border-color);
    }

    @media (max-width: 768px) {
      .account-container {
        grid-template-columns: 1fr;
      }

      .account-sidebar {
        display: none;
      }

      .order-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Header -->
  <header>
    <nav>
      <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;"><i class="fas fa-shopping-bag"></i> Wuroud Mart</a></div>

      <div class="nav-center">
        <div class="search-bar">
          <i class="fas fa-search" style="color: var(--text-secondary);"></i>
          <input type="text" placeholder="Search for products...">
          <button type="button">Search</button>
        </div>
      </div>

      <div class="nav-right">
        <div class="nav-item" onclick="viewWishlist()">
          <i class="fas fa-heart"></i>
          <span>Wishlist</span>
        </div>

        <div class="nav-item" onclick="openOrderForm()">
          <i class="fas fa-shopping-cart"></i>
          <span>Cart</span>
        </div>

        <div class="nav-item" id="myOrdersBtn" style="display: none; cursor: pointer;" onclick="window.location.href='account.html?tab=orders'">
          <i class="fas fa-box"></i>
          <span>My Orders</span>
        </div>

        <div class="nav-item" id="myAccountBtn" style="display: none; cursor: pointer;" onclick="toggleAccountMenu()">
          <i class="fas fa-user-circle"></i>
          <span>Account</span>
        </div>

        <div id="accountDropdown" style="display: none; position: absolute; top: 60px; right: 10px; background: white; border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 1000; min-width: 150px;">
          <div style="padding: 1rem 0;">
            <div style="padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border-color);" onclick="showTab('profile')">
              <i class="fas fa-user"></i> Profile
            </div>
            <div style="padding: 0.75rem 1rem; cursor: pointer;" onclick="logoutUser()">
              <i class="fas fa-sign-out-alt"></i> Logout
            </div>
          </div>
        </div>

        <div id="authLink" class="nav-item" style="display: none; cursor: pointer; background: var(--primary-blue); color: white; padding: 0.75rem 1rem; border-radius: 6px; margin-left: 0.5rem;" onclick="window.location.href='auth.html'">
          <i class="fas fa-sign-in-alt"></i>
          <span>Login</span>
        </div>
      </div>

      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <!-- Main Content -->
  <main style="background: var(--bg-light); min-height: calc(100vh - 70px); padding: 2rem 0;">
    <div class="container">
      <div class="account-container">
        <!-- Sidebar -->
        <aside class="account-sidebar">
          <div class="menu-item active" onclick="showTab('profile')">
            <i class="fas fa-user"></i> Profile
          </div>
          <div class="menu-item" onclick="showTab('orders')">
            <i class="fas fa-box"></i> My Orders
          </div>
          <div class="menu-item" onclick="showTab('settings')">
            <i class="fas fa-cog"></i> Settings
          </div>
        </aside>

        <!-- Content Area -->
        <div class="account-content">
          <!-- Profile Section -->
          <div class="section active" id="profileSection">
            <div class="profile-header">
              <div class="profile-avatar">
                <i class="fas fa-user"></i>
              </div>
              <div class="profile-info">
                <h2 id="profileName">Loading...</h2>
                <p id="profileEmail">Loading...</p>
                <p style="font-size: 0.875rem; color: var(--text-light);">Member since <span id="memberSince">--</span></p>
              </div>
            </div>

            <button class="btn btn-primary" onclick="showTab('settings')" style="width: auto;">
              <i class="fas fa-edit"></i> Edit Profile
            </button>
          </div>

          <!-- Orders Section -->
          <div class="section" id="ordersSection">
            <h2><i class="fas fa-box"></i> My Orders</h2>
            <div id="ordersContainer" style="margin-top: 2rem;">
              <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No orders yet</p>
              </div>
            </div>
          </div>

          <!-- Settings Section -->
          <div class="section" id="settingsSection">
            <h2><i class="fas fa-cog"></i> Account Settings</h2>

            <form class="edit-form" onsubmit="handleProfileUpdate(event)">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="settingsName" required>
              </div>

              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="settingsEmail" disabled>
              </div>

              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="settingsPhone" placeholder="+971-50-XXXX-XXXX">
              </div>

              <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="settingsAddress" placeholder="Enter your full address" rows="4"></textarea>
              </div>

              <div class="btn-group">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save"></i> Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer style="background: var(--text-primary); color: var(--bg-white); padding: 2rem 1rem; text-align: center; margin-top: 2rem;">
    <div class="container">
      <p>&copy; 2024 Wuroud Mart. All rights reserved.</p>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/auth.js"></script>

  <script>
    /**
     * Show specific tab
     */
    function showTab(tab) {
      // Hide all sections
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));

      // Show selected section
      const sectionId = tab === 'profile' ? 'profileSection' : tab === 'orders' ? 'ordersSection' : 'settingsSection';
      document.getElementById(sectionId).classList.add('active');

      // Highlight menu item
      const menuItems = document.querySelectorAll('.menu-item');
      if (tab === 'profile') menuItems[0].classList.add('active');
      else if (tab === 'orders') menuItems[1].classList.add('active');
      else menuItems[2].classList.add('active');

      // Load data if switching to orders
      if (tab === 'orders') {
        loadUserOrders();
      }
    }

    /**
     * Toggle account dropdown menu
     */
    function toggleAccountMenu() {
      const dropdown = document.getElementById('accountDropdown');
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    }

    /**
     * Load and display user profile
     */
    async function loadUserProfile() {
      if (!isUserLoggedIn()) {
        window.location.href = 'auth.html';
        return;
      }

      const user = getCurrentUser();
      document.getElementById('profileName').textContent = user.displayName || 'User';
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('settingsName').value = user.displayName || '';
      document.getElementById('settingsEmail').value = user.email;

      // Load additional user data from Firestore
      try {
        const userDoc = await db.collection('users').doc(getCurrentUserId()).get();
        if (userDoc.exists) {
          const userData = userDoc.data();
          document.getElementById('settingsPhone').value = userData.phone || '';
          document.getElementById('settingsAddress').value = userData.address || '';

          if (userData.createdAt) {
            const date = userData.createdAt.toDate ? userData.createdAt.toDate() : new Date(userData.createdAt);
            document.getElementById('memberSince').textContent = date.toLocaleDateString();
          }
        }
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }

    /**
     * Load user orders
     */
    async function loadUserOrders() {
      const orders = await getUserOrders();
      const container = document.getElementById('ordersContainer');

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>No orders yet. <a href="products.html">Start shopping now!</a></p>
          </div>
        `;
        return;
      }

      container.innerHTML = orders.map(order => `
        <div class="order-card">
          <div class="order-header">
            <span class="order-id">Order #${order.id.substring(0, 8)}</span>
            <span class="order-status ${order.status || 'pending'}">${order.status || 'pending'}</span>
          </div>

          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <div>
              <p style="margin: 0; color: var(--text-secondary); font-size: 0.875rem;">Order Date</p>
              <p style="margin: 0.25rem 0; font-weight: 600;">${order.createdAt ? new Date(order.createdAt.toDate ? order.createdAt.toDate() : order.createdAt).toLocaleDateString() : '--'}</p>
            </div>
            <div>
              <p style="margin: 0; color: var(--text-secondary); font-size: 0.875rem;">Pickup Date</p>
              <p style="margin: 0.25rem 0; font-weight: 600;">${order.customer?.preferredDeliveryDate || '--'}</p>
            </div>
          </div>

          <div class="order-items">
            ${order.items.map(item => `
              <div class="order-item">
                <div>
                  <strong>${item.name}</strong>
                  <br>
                  <small style="color: var(--text-secondary);">Qty: ${item.quantity}${item.selectedSize ? ` | Size: ${item.selectedSize}` : ''}</small>
                </div>
                <div style="text-align: right;">
                  <strong>₹${(item.price * item.quantity).toLocaleString()}</strong>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="order-total">
            <span>Total Amount:</span>
            <span>₹${order.totalAmount?.toLocaleString() || 0}</span>
          </div>

          ${order.customer?.specialRequests ? `<p style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.875rem;"><strong>Special Requests:</strong> ${order.customer.specialRequests}</p>` : ''}
        </div>
      `).join('');
    }

    /**
     * Handle profile update
     */
    async function handleProfileUpdate(event) {
      event.preventDefault();

      const userData = {
        displayName: document.getElementById('settingsName').value,
        phone: document.getElementById('settingsPhone').value,
        address: document.getElementById('settingsAddress').value
      };

      try {
        await updateUserProfile(userData);
        loadUserProfile();
      } catch (error) {
        console.error('Error updating profile:', error);
      }
    }

    // Check URL params for tab
    const urlParams = new URLSearchParams(window.location.search);
    const tab = urlParams.get('tab') || 'profile';

    // Load profile on page load
    window.addEventListener('DOMContentLoaded', () => {
      initializeFirebase().then(() => {
        initAuthListeners();
        loadUserProfile();
        showTab(tab);
      });
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('accountDropdown');
      if (e.target.closest('#myAccountBtn')) return;
      if (!e.target.closest('#accountDropdown')) {
        dropdown.style.display = 'none';
      }
    });
  </script>
</body>
</html>
